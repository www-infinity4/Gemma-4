<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemma 4 Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4285f4, #0f9d58, #f4b400, #db4437);
      border-radius: 8px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    header .model-badge {
      margin-left: auto;
      font-size: 0.75rem;
      background: #2a2d3a;
      border: 1px solid #3a3d4a;
      border-radius: 12px;
      padding: 3px 10px;
      color: #8b8fa8;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 780px;
      width: 100%;
    }

    .message.user {
      margin-left: auto;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: #3b82f6;
      color: #fff;
    }

    .message.assistant .avatar {
      background: linear-gradient(135deg, #4285f4, #0f9d58);
      color: #fff;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #1e2130;
      border: 1px solid #2a2d3a;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .message.assistant.thinking .bubble {
      opacity: 0.6;
      font-style: italic;
    }

    .error-banner {
      background: #3b1a1a;
      border: 1px solid #7f2626;
      color: #f87171;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin: 0 20px;
    }

    #input-area {
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      padding: 16px 20px;
    }

    #input-row {
      display: flex;
      gap: 10px;
      max-width: 780px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 0.95rem;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    #user-input:focus { border-color: #3b82f6; }

    #send-btn {
      background: #2563eb;
      border: none;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) { background: #1d4ed8; }
    #send-btn:disabled { background: #2a2d3a; cursor: not-allowed; }

    #send-btn svg { width: 20px; height: 20px; }

    #clear-btn {
      background: none;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8b8fa8;
      transition: border-color 0.2s, color 0.2s;
    }

    #clear-btn:hover { border-color: #ef4444; color: #ef4444; }
    #clear-btn svg { width: 18px; height: 18px; }

    .welcome {
      text-align: center;
      margin: auto;
      opacity: 0.5;
    }

    .welcome h2 { font-size: 1.4rem; margin-bottom: 6px; }
    .welcome p { font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <div class="logo"></div>
    <h1>Gemma 4 Chat</h1>
    <span class="model-badge">{{ model }}</span>
  </header>

  <div id="chat-window">
    <div class="welcome" id="welcome-msg">
      <h2>Chat with Gemma 4</h2>
      <p>Start a conversation below.</p>
    </div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <button id="clear-btn" title="Clear conversation">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
      <textarea id="user-input" placeholder="Message Gemma 4…" rows="1"></textarea>
      <button id="send-btn" title="Send">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </button>
    </div>
  </div>

  <script>
    const chatWindow = document.getElementById('chat-window');
    const userInput  = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const clearBtn   = document.getElementById('clear-btn');
    const welcomeMsg = document.getElementById('welcome-msg');

    let history = [];

    function scrollBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addMessage(role, text, extraClass = '') {
      welcomeMsg.style.display = 'none';
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}${extraClass ? ' ' + extraClass : ''}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'U' : 'G';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      chatWindow.appendChild(wrapper);
      scrollBottom();
      return { wrapper, bubble };
    }

    function showError(msg) {
      const div = document.createElement('div');
      div.className = 'error-banner';
      div.textContent = '⚠ ' + msg;
      chatWindow.appendChild(div);
      scrollBottom();
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      userInput.value = '';
      userInput.style.height = '';
      sendBtn.disabled = true;

      addMessage('user', text);
      history.push({ role: 'user', text });

      const { wrapper, bubble } = addMessage('assistant', '…', 'thinking');

      try {
        const resp = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
        });
        const data = await resp.json();

        if (data.error) {
          wrapper.remove();
          showError(data.error);
        } else {
          wrapper.classList.remove('thinking');
          bubble.textContent = data.reply;
          history.push({ role: 'model', text: data.reply });
          scrollBottom();
        }
      } catch (err) {
        wrapper.remove();
        showError('Network error: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    });

    clearBtn.addEventListener('click', () => {
      history = [];
      chatWindow.innerHTML = '';
      chatWindow.appendChild(welcomeMsg);
      welcomeMsg.style.display = '';
    });
  </script>
</body>
</html>
